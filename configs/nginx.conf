# Nginx API Gateway Configuration
# Routes relayer endpoints under a single port
# For: Voting & ID Registration

events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver.
    # Using variables for proxy_pass forces per-request DNS lookup, so nginx
    # starts cleanly even when upstream containers are temporarily down.
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Registration Relayer - ID Registration
        location /integrations/registration-relayer/ {
            set $reg_upstream registration-relayer:8000;
            proxy_pass http://$reg_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proof Verification Relayer - Voting
        location /integrations/proof-verification-relayer/ {
            set $pvr_upstream proof-verification-relayer:8000;
            proxy_pass http://$pvr_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSO Service — wallet auth + OAuth2 auth-code/PKCE flow
        location /v1/ {
            set $sso_upstream sso-svc:8000;

            # CORS for browser-based RP clients (dev test page, future web SDKs).
            # Reflect the request Origin so credentials work; allow any origin in dev.
            set $cors_origin "$http_origin";
            if ($cors_origin = "") { set $cors_origin "*"; }

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Max-Age       86400 always;

            # Short-circuit preflight requests.
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age       86400 always;
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://$sso_upstream;
            # Use $http_host (not $host) to preserve the port (e.g. 192.168.x.x:8000)
            # so sso-svc can embed the correct public api_url in its deep links.
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
