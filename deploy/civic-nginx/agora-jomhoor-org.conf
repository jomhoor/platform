# agora.jomhoor.org — Agora Citizen Network (deliberation platform)
# Proxies to agora-api and agora-frontend on the agora Docker network
#
# This file is served by civic-nginx (the Civic Compass nginx container)
# which also handles compass.jomhoor.org and api.iranians.vote.
# civic-nginx owns ports 80/443, so agora is added as another vhost.
#
# Deployed to: /opt/civic-compass/nginx/conf.d/agora-jomhoor-org.conf
#
# Network setup:
#   civic-nginx must be connected to the `agora` Docker network.
#   Add to civic-compass docker-compose.production.yml under nginx service:
#     networks:
#       agora:
#         external: true
#         name: deploy_agora       # matches docker-compose.agora.yaml network
#
#   And at top-level networks:
#     agora:
#       external: true
#       name: deploy_agora

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name agora.jomhoor.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name agora.jomhoor.org;

    # SSL certificates (obtain with certbot before enabling)
    ssl_certificate     /etc/letsencrypt/live/agora.jomhoor.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agora.jomhoor.org/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # API requests → agora-api container (Fastify on port 8080)
    location /api/ {
        proxy_pass http://agora-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # WebSocket support (UCAN uses long-polling or WS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend SPA → agora-frontend container (nginx on port 80)
    location / {
        proxy_pass http://agora-frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
