version: '3.8'

# Production Docker Compose for Iranians.Vote
# Server: 173.212.214.147 (api.iranians.vote)
# Rarimo L2 Mainnet Deployment
#
# Services:
# - registration-relayer: Identity registration
# - proof-verification-relayer: Voting (v0.9.0 with Noir support)
#
# Networking:
#   The `iranians-vote` network is also joined by civic-nginx (from the
#   civic-compass stack) which terminates TLS and proxies HTTPS traffic to
#   these relayer containers. See civic-compass docker-compose for:
#     networks:
#       iranians-vote:
#         external: true
#         name: iranians-vote_default
#   The nginx vhost is in deploy/nginx-vhosts/api-iranians-vote.conf.
#
# Usage:
#   cp .env.example .env  # Fill in RELAYER_PRIVATE_KEY
#   docker compose -f docker-compose.production.yaml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: iranians-vote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rarimo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rarimo}
      POSTGRES_DB: proof_verification
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iranians-vote
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rarimo -d proof_verification"]
      interval: 5s
      timeout: 5s
      retries: 5

  registration-relayer:
    image: ghcr.io/rarimo/registration-relayer:v1.0.6
    container_name: registration-relayer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - KV_VIPER_FILE=/config.yaml
      - RELAYER_PRIVATE_KEY=${RELAYER_PRIVATE_KEY}
    volumes:
      - ../configs/registration-relayer.production.yaml:/config.yaml:ro
    networks:
      - iranians-vote

  proof-verification-relayer:
    image: ghcr.io/rarimo/proof-verification-relayer:v0.9.0
    container_name: proof-verification-relayer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      - KV_VIPER_FILE=/config.yaml
      - RELAYER_PRIVATE_KEY=${RELAYER_PRIVATE_KEY}
      - POSTGRES_USER=${POSTGRES_USER:-rarimo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rarimo}
    volumes:
      - ../configs/proof-verification-relayer.production.yaml:/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iranians-vote
    command: ["sh", "-c", "proof-verification-relayer migrate up && proof-verification-relayer run service"]

  # ============================================
  # SSO Service Database
  # ============================================

  sso-postgres:
    image: postgres:15-alpine
    container_name: sso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SSO_POSTGRES_USER:-sso}
      POSTGRES_PASSWORD: ${SSO_POSTGRES_PASSWORD:?SSO_POSTGRES_PASSWORD required}
      POSTGRES_DB: sso
    volumes:
      - sso_postgres_data:/var/lib/postgresql/data
    networks:
      - iranians-vote
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # SSO Service
  # ============================================

  sso-svc:
    image: ghcr.io/jomhoor/sso-svc:latest
    container_name: sso-svc
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8000"
    environment:
      - KV_VIPER_FILE=/config.yaml
      - SSO_DB_URL=postgres://sso:${SSO_POSTGRES_PASSWORD}@sso-postgres:5432/sso?sslmode=disable
      - SSO_JWT_SECRET=${SSO_JWT_SECRET:?SSO_JWT_SECRET required}
      - SSO_PAIRWISE_SECRET=${SSO_PAIRWISE_SECRET:?SSO_PAIRWISE_SECRET required}
      - SSO_IOS_TEAM_ID=${SSO_IOS_TEAM_ID}
      - SSO_IOS_BUNDLE_ID=${SSO_IOS_BUNDLE_ID:-org.jomhoor.app}
      - SSO_IOS_ATTEST_ENV=${SSO_IOS_ATTEST_ENV:-production}
      - SSO_ANDROID_PACKAGE_NAME=${SSO_ANDROID_PACKAGE_NAME:-org.jomhoor.app}
      - SSO_ANDROID_SIGNING_CERT_DIGESTS=${SSO_ANDROID_SIGNING_CERT_DIGESTS}
      - SSO_ANDROID_REQUIRE_STRONG_INTEGRITY=${SSO_ANDROID_REQUIRE_STRONG_INTEGRITY:-true}
    # config.yaml is baked into the image (see services/sso-svc/Dockerfile);
    # all host-specific values come from env vars above.
    depends_on:
      sso-postgres:
        condition: service_healthy
    networks:
      - iranians-vote
    command: ["sh", "-c", "sso-svc migrate up && sso-svc run service"]

networks:
  iranians-vote:
    driver: bridge

volumes:
  postgres_data:
  sso_postgres_data:
