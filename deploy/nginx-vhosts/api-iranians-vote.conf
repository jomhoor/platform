# api.iranians.vote — Iranians.Vote relayer API
# Proxies to registration-relayer and proof-verification-relayer
# on the iranians-vote_default Docker network
#
# This file is served by civic-nginx (the Civic Compass nginx container)
# which also handles compass.jomhoor.org. civic-nginx owns ports 80/443
# on the server, so api.iranians.vote is served as an additional vhost.
#
# Deployed to: /opt/civic-compass/nginx/conf.d/api-iranians-vote.conf

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.iranians.vote;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name api.iranians.vote;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/api.iranians.vote/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.iranians.vote/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # CORS headers for mobile app
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Registration relayer
    location /integrations/registration-relayer/ {
        proxy_pass http://registration-relayer:8000/integrations/registration-relayer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Proof verification relayer (voting)
    location /integrations/proof-verification-relayer/ {
        proxy_pass http://proof-verification-relayer:8000/integrations/proof-verification-relayer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
