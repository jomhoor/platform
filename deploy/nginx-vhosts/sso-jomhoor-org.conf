# sso.jomhoor.org — Jomhoor SSO service
# Proxies to sso-svc container on the iranians-vote Docker network.
#
# This file is served by civic-nginx (the Civic Compass nginx container)
# which owns ports 80/443.
#
# Deployed to: /opt/civic-compass/nginx/conf.d/sso-jomhoor-org.conf
#
# Network setup:
#   civic-nginx must be connected to the `iranians-vote` Docker network.
#   The sso-svc container must be reachable at hostname `sso-svc` on that network.
#
# NOTE: /.well-known/apple-app-site-association and /.well-known/assetlinks.json
# are served directly by sso-svc (no trailing-slash strip). iOS and Android fetch
# these at install time to enable Universal Links and App Links.
#
# NOTE: auth.jomhoor.org is intentionally NOT listed in associated-domains;
# only sso.jomhoor.org intercepts deep links in the app.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name sso.jomhoor.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name sso.jomhoor.org;

    # SSL certificates (obtain with certbot before enabling)
    ssl_certificate     /etc/letsencrypt/live/sso.jomhoor.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.jomhoor.org/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (no includeSubDomains so it doesn't affect jomhoor.org subdomains)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP: this host is API-only (no HTML pages), so lock down completely.
    add_header Content-Security-Policy "default-src 'none'" always;

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Well-known files MUST be served at the root, with correct Content-Type,
    # and without redirect — iOS/Android fetch these unconditionally.
    # The sso-svc handlers set Content-Type: application/json themselves.
    location /.well-known/ {
        proxy_pass http://sso-svc:8000/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # iOS requires the AASA to be served without redirect and within 30s.
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
    }

    # All SSO API calls and Universal Link paths
    location / {
        proxy_pass http://sso-svc:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
