# ------------------------------------------------------------------
# taraaz.jomhoor.org — Agora reverse-proxy (runs on the HOST nginx)
# Place this file in /etc/nginx/sites-available/taraaz.jomhoor.org
# Then:  ln -s /etc/nginx/sites-available/taraaz.jomhoor.org /etc/nginx/sites-enabled/
# ------------------------------------------------------------------

# Detect social-media crawlers for OG preview routing
map $http_user_agent $is_og_bot {
    default                     0;
    ~*facebookexternalhit       1;
    ~*Twitterbot                1;
    ~*LinkedInBot               1;
    ~*WhatsApp                  1;
    ~*TelegramBot               1;
    ~*Slackbot                  1;
    ~*Discordbot                1;
    ~*Googlebot                 1;
    ~*bingbot                   1;
}

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name taraaz.jomhoor.org;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://taraaz.jomhoor.org$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name taraaz.jomhoor.org;

    ssl_certificate     /etc/letsencrypt/live/taraaz.jomhoor.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taraaz.jomhoor.org/privkey.pem;

    # Verificator (ZK proof verification via Rarimo)
    location /integrations/verificator-svc {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8100;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Backend API
    location /api {
        client_max_body_size 150M;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8180;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Redirect /post/* to /feed/post/*
    location /post/ {
        rewrite ^/post/(.*)$ /feed/post/$1 permanent;
    }

    # OG endpoint — proxied to Fastify API (matched by bot rewrite below)
    location /og/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8180;
        proxy_read_timeout 10s;
        proxy_buffering off;
    }

    # Conversation URLs — route social bots to OG endpoint, users to SPA
    location ~ ^/feed/conversation/([a-zA-Z0-9_-]+) {
        set $convo_slug $1;

        # Social crawlers get rewritten to the API OG endpoint
        if ($is_og_bot) {
            rewrite ^ /og/conversation/$convo_slug last;
        }

        # Regular users get the SPA
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/conversation/$convo_slug$is_args$args;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Short conversation URLs — route bots to OG endpoint, users to SPA
    location ~ ^/conversation/([a-zA-Z0-9_-]+) {
        set $convo_slug $1;

        if ($is_og_bot) {
            rewrite ^ /og/conversation/$convo_slug last;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/conversation/$convo_slug$is_args$args;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # SvelteKit app served under /feed/
    location = /feed {
        return 302 /feed/;
    }

    location /feed/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # SPA static assets — must be explicitly proxied so they load correctly
    # regardless of which path (e.g. /auth/callback, /feed/) serves the HTML.
    # Without this, /assets/* falls through to "location /" → 302 /feed/ and
    # the JS/CSS never loads, leaving a blank page.
    location /assets/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/assets/;
        proxy_read_timeout 60s;
        proxy_buffering off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /images/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/images/;
        proxy_read_timeout 60s;
        proxy_buffering off;
        # agora-app serves images with immutable,max-age=604800; strip it so
        # browsers always revalidate (needed when brand images are replaced).
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache" always;
    }

    location /icons/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/icons/;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Static OG fallback image (served by agora-app container)
    location = /og-image.png {
        proxy_pass http://127.0.0.1:8190/og-image.png;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:8190/favicon.ico;
    }

    # SSO OAuth2 callback — proxy to Quasar SPA, bypassing the /feed/ redirect
    location /auth/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/auth/;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Root — redirect to /feed/
    location / {
        return 302 /feed/;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
