log:
  level: debug
  disable_sentry: true

listener:
  addr: :8000

db:
  url: ${SSO_DB_URL}

jwt:
  secret_key: ${SSO_JWT_SECRET}
  access_expiration_time: 1h
  refresh_expiration_time: 24h

pairwise:
  secret_key: ${SSO_PAIRWISE_SECRET}

cookies:
  domain: jomhoor.org
  secure: true
  same_site: 4

# Wallet-app deep link (M3 /v1/authorize redirect target).
# Universal Link is the primary; iOS AASA / Android assetlinks intercept it.
# CustomScheme is reserved for local-dev / sideloaded builds.
deeplink:
  universal_link_base: ${SSO_DEEPLINK_UNIVERSAL_BASE}
  custom_scheme: ${SSO_DEEPLINK_CUSTOM_SCHEME}

# ZK assertion verification (M5 item 4 — POST /v1/assertions/zk).
# Per-client zkRequired in sso_clients table gates whether the gate is enforced;
# this block configures *how* proofs are verified when submitted.
#
# Multi-circuit registry: wallet sends `circuit_id` with each proof. Adding a
# new variant (e.g. a new Iranian passport generation, German ECDSA, …) is a
# config-only change — drop the deployed verifier contract address in below.
# All circuits share the same global event_id and RegistrationSMT root (one
# identity graph). Verification itself is done on-chain via eth_call to each
# circuit's `verify(bytes,bytes32[])` — proving-system agnostic.
zkp:
  enabled: ${SSO_ZKP_ENABLED}
  # Decimal-string field element. Wallet MUST use this as the circuit event_id.
  event_id: ${SSO_ZKP_EVENT_ID}
  # How long an inserted `zk_verified` assertion remains live.
  assertion_ttl: 720h
  # On-chain RPC and RegistrationSMT root binding. rpc_url is required when
  # zkp is enabled (used for both the verifier eth_call and SMT-root check);
  # registration_smt_address is optional (skipped when blank — dev only).
  rpc_url: ${SSO_ZKP_RPC_URL}
  registration_smt_address: ${SSO_ZKP_REGISTRATION_SMT}
  # Circuit registry. Keys are stable `circuit_id` strings the wallet emits.
  # Pub-signal indices default to Rarimo queryIdentity layout (0/9/8) and are
  # overridden per-circuit only when the circuit's signal layout differs
  # (e.g. INID's queryIdentity_inid_ca has 23 signals, not 24).
  circuits:
    # Most international biometric passports (incl. modern Iranian, US, FR, …).
    # TODO: deploy a Groth16 verifier contract for queryIdentity and set this.
    passport_rsa_2048_sha256_e65537:
      verifier_address: ${SSO_ZKP_VERIFIER_PASSPORT_RSA2048_SHA256}
      nullifier_index: 0
      event_id_index: 9
      smt_root_index: 8
    # Iranian National ID card (queryIdentity_inid_ca, UltraPlonk Noir).
    # Defaults to our sovereign NoirTD1Verifier deployed on Rarimo L2 mainnet
    # at 0x5f9D7d7Fc6D498eA48d57D7591e118eA2cF0f0be — same contract voting uses.
    inid_rsa_2048:
      verifier_address: ${SSO_ZKP_VERIFIER_INID_RSA2048}
      nullifier_index: 0
      event_id_index: 9
      smt_root_index: 8
    # Iranian passport Variant A (RSA-2048 SHA-1 E58333, Rarimo Type 6).
    # TODO: deploy a Groth16 verifier contract for this variant.
    passport_rsa_2048_sha1_e58333:
      verifier_address: ${SSO_ZKP_VERIFIER_PASSPORT_RSA2048_SHA1_E58333}
      nullifier_index: 0
      event_id_index: 9
      smt_root_index: 8
    # Add new variants here as verifier contracts are deployed (Variant-B
    # E33259, German ECDSA brainpoolP384r1, …).

app_attestation:
  enabled: true
  # Set to "development" for local/TestFlight builds; "production" for App Store.
  ios:
    team_id: ${SSO_IOS_TEAM_ID}
    bundle_id: ${SSO_IOS_BUNDLE_ID}
    environment: ${SSO_IOS_ATTEST_ENV}
  android:
    package_name: ${SSO_ANDROID_PACKAGE_NAME}
    # Comma-separated SHA-256 digests of allowed signing certificates.
    # Include both upload-cert digest AND Play-managed signing cert digest.
    signing_cert_digests: ${SSO_ANDROID_SIGNING_CERT_DIGESTS}
    # Set to false in dev to accept MEETS_BASIC_INTEGRITY from debug builds.
    require_strong_integrity: ${SSO_ANDROID_REQUIRE_STRONG_INTEGRITY}
    # Server-side Google API key with Play Integrity API enabled.
    google_api_key: ${SSO_ANDROID_GOOGLE_API_KEY}
